site_name: My Notebook
theme:
  name: material
  palette:
    scheme: slate

nav:
  - Front Page: index.md
  - Writing Guide: markdown_guide.md
  - Git Guide: Git.md
  - Algorithm:
    - Basic_Algorithm: Basic_Algorithm.md
  - HTML: HTML.md


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tilde
  - pymdownx.caret
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - md_in_html
  - attr_list

extra_css:
  - stylesheets/extra.css