<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Try</title>
    </head>
    <body>
        <p style="color: rgb(5, 103, 125);">there are 6 titles</p>
        <h1>It's my first title</h1>
        <h2>It's my first subtitle</h2>
        <h3>It's my first subsubtitle</h3>
        <h4>It's my first subsubsubtitle</h4>
        <h5>It's my first subsubsubsubtitle</h5>
        <h6>It's my first subsubsubsubsubtitle</h6>
        <a href="https://www.google.com">Google</a><br>
        <a href="https://www.bilibili.com/">Bilibili</a><br><br>
        <input type="text" placeholder="请输入内容"><br><br>
        <input type="password" id="password" placeholder="请输入密码"><br>
        <button onclick="checkPwd()">Submit</button><br><br>
        <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        <script>
            function checkPwd(){
                var pwd = document.getElementById("password").value;
                if(pwd === "123456"){
                    alert("密码正确！");
                } else {
                    alert("密码错误！");
                }
            }
        </script>
    </body>
</html>
